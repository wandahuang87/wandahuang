<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Marketing &amp; Projects — Wanda Huang</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--black:#0a0a0a;--white:#f5f4f0;--gray:#888;--light:#e8e6e1;}
    body{background:var(--white);color:var(--black);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:300;line-height:1.6;}

    nav{position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:1.5rem 3rem;background:var(--white);border-bottom:1px solid var(--light);}
    .nav-logo{font-size:.72rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--black);text-decoration:none;}
    .nav-links{display:flex;gap:2.5rem;list-style:none;}
    .nav-links a{font-size:.68rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--black);text-decoration:none;opacity:.55;transition:opacity .2s;}
    .nav-links a:hover,.nav-links a.active{opacity:1;}
    .nav-links a.active{border-bottom:1.5px solid var(--black);padding-bottom:2px;}

    .page-header{padding:5rem 3rem 3rem;border-bottom:1px solid var(--light);}
    .section-num{font-size:.65rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gray);display:block;margin-bottom:1rem;}
    .page-header h1{font-size:clamp(3rem,7vw,6.5rem);font-weight:800;text-transform:uppercase;letter-spacing:-.02em;line-height:.95;}
    .page-header p{font-size:.8rem;color:var(--gray);letter-spacing:.1em;margin-top:1.2rem;max-width:480px;}

    /* SECTION DIVIDER */
    .section-block{border-top:3px solid var(--black);margin-top:0;}
    .section-header{padding:2rem 3rem 1.5rem;display:flex;align-items:baseline;gap:1.5rem;}
    .section-tag{font-size:.62rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gray);}
    .section-title{font-size:1.1rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;}

    /* ENTRY */
    .entries{padding:0 0 4rem;}
    .entry{border-bottom:1px solid var(--light);}
    .entry-content{padding:3rem 3rem 4rem;}
    .entry-header{display:grid;grid-template-columns:80px 1fr;gap:2rem;margin-bottom:2rem;align-items:start;}
    .entry-num{font-size:.62rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gray);padding-top:.4rem;}
    .entry-title-link{font-size:1.5rem;font-weight:800;text-transform:uppercase;letter-spacing:.02em;color:var(--black);text-decoration:none;display:block;margin-bottom:.3rem;transition:opacity .2s;}
    .entry-title-link:hover{opacity:.6;}
    .view-case{display:inline-flex;align-items:center;gap:.4rem;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gray);text-decoration:none;margin-top:1rem;transition:color .2s;}
    .view-case:hover{color:var(--black);}
    .entry-role{font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gray);}
    .entry-intro{font-size:.92rem;line-height:1.85;color:#444;margin-top:.65rem;max-width:620px;}

    /* GALLERY */
    .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-top:2rem;}
    .gallery:empty{display:none;}
    .gallery-item{position:relative;aspect-ratio:16/9;overflow:hidden;background:#ddd;cursor:pointer;}
    .gallery-item img,.gallery-item video{width:100%;height:100%;object-fit:cover;display:block;}
    .gallery-item.video-item::after{content:'▶';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.8rem;color:rgba(255,255,255,.9);pointer-events:none;text-shadow:0 2px 8px rgba(0,0,0,.5);}
    .gallery-item:hover img{transform:scale(1.03);transition:transform .3s;}

    /* LIGHTBOX */
    .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:500;align-items:center;justify-content:center;}
    .lightbox.open{display:flex;}
    .lightbox-inner{position:relative;max-width:90vw;max-height:90vh;}
    .lightbox-inner img,.lightbox-inner video{max-width:90vw;max-height:86vh;object-fit:contain;display:block;}
    .lightbox-close{position:absolute;top:-2.2rem;right:0;background:none;border:none;color:#fff;font-size:1rem;cursor:pointer;letter-spacing:.15em;text-transform:uppercase;}
    .lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.1);border:none;color:#fff;width:40px;height:40px;cursor:pointer;font-size:1.3rem;display:flex;align-items:center;justify-content:center;transition:background .2s;}
    .lightbox-nav:hover{background:rgba(255,255,255,.25);}
    .lightbox-prev{left:-52px;} .lightbox-next{right:-52px;}

    /* SOCIAL */
    .social-section{padding:3rem;border-top:1px solid var(--light);}
    .social-section h3{font-size:.65rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gray);margin-bottom:1.5rem;}
    .social-links{display:flex;flex-wrap:wrap;gap:1rem;}
    .social-link{display:inline-flex;align-items:center;gap:.5rem;font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;color:var(--black);text-decoration:none;border:1.5px solid var(--black);padding:.55rem 1.2rem;transition:background .2s,color .2s;}
    .social-link:hover{background:var(--black);color:var(--white);}

    .page-footer{padding:3rem;border-top:1px solid var(--light);display:flex;justify-content:space-between;align-items:center;}
    .page-footer a{font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--black);text-decoration:none;opacity:.55;transition:opacity .2s;}
    .page-footer a:hover{opacity:1;}

    @media(max-width:768px){
      nav{padding:1.2rem 1.5rem;} .nav-links{gap:1.2rem;}
      .page-header{padding:3rem 1.5rem 2rem;}
      .section-header{padding:1.5rem 1.5rem 1rem;}
      .entry-content{padding:2rem 1.5rem 3rem;}
      .entry-header{grid-template-columns:50px 1fr;gap:1rem;}
      .gallery{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}
      .social-section,.page-footer{padding:2rem 1.5rem;}
      .page-footer{flex-direction:column;gap:1rem;text-align:center;}
      .lightbox-prev{left:-36px;} .lightbox-next{right:-36px;}
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">Wanda Huang</a>
  <ul class="nav-links">
    <li><a href="about.html">About</a></li>
    <li><a href="marketing.html" class="active">Marketing &amp; Projects</a></li>
  </ul>
</nav>

<div class="page-header">
  <span class="section-num">[ 02 — Work ]</span>
  <h1>Marketing<br>&amp; Projects</h1>
  <p>Campaigns, content, and community — plus end-to-end project ownership from concept to launch.</p>
</div>

<!-- MARKETING SECTION -->
<div class="section-block">
  <div class="section-header">
    <span class="section-tag">01 — Marketing</span>
    <span class="section-title">Marketing Experience</span>
  </div>
  <div class="entries" id="marketing-container"></div>
</div>

<!-- PROJECTS SECTION -->
<div class="section-block">
  <div class="section-header">
    <span class="section-tag">02 — Projects</span>
    <span class="section-title">Project Management</span>
  </div>
  <div class="entries" id="projects-container"></div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <div class="lightbox-inner" id="lightbox-inner">
    <button class="lightbox-close" onclick="closeLightbox()">✕ Close</button>
    <button class="lightbox-nav lightbox-prev" onclick="lbNav(-1);event.stopPropagation()">‹</button>
    <button class="lightbox-nav lightbox-next" onclick="lbNav(1);event.stopPropagation()">›</button>
  </div>
</div>

<div class="social-section">
  <h3>Connect with me</h3>
  <div class="social-links" id="social-links"></div>
</div>
<div class="page-footer">
  <a href="about.html">← About Me</a>
  <a href="index.html">Home →</a>
</div>

<script src="portfolio-data.js"></script>
<script>
var _D=null; // resolved data cache
function getData(){return _D||_rawData();}
function _rawData(){
  if(window._PD) return window._PD; // GitHub Pages: data baked in via portfolio-data.js
  try{
    const ls=localStorage.getItem('wanda_portfolio');
    if(ls){try{sessionStorage.setItem('wanda_portfolio',ls);}catch(e){}return JSON.parse(ls);}
    const ss=sessionStorage.getItem('wanda_portfolio');
    if(ss){try{localStorage.setItem('wanda_portfolio',ss);}catch(e){}return JSON.parse(ss);}
    return{};
  }catch(e){return{};}
}
// IDB helpers — resolve idb:key refs to real base64
function _openIDB(){return new Promise(function(res,rej){var r=indexedDB.open('wanda_imgs',1);r.onupgradeneeded=function(e){e.target.result.createObjectStore('imgs');};r.onsuccess=function(e){res(e.target.result);};r.onerror=function(){rej(r.error);};});}
async function _imgGet(ref){if(!ref)return'';if(!ref.startsWith('idb:'))return ref;var db=await _openIDB();return new Promise(function(res,rej){var tx=db.transaction('imgs','readonly');var r=tx.objectStore('imgs').get(ref.slice(4));r.onsuccess=function(){res(r.result||'');};r.onerror=function(){rej(r.error);};});}
async function _resolveImgs(d){
  var data=JSON.parse(JSON.stringify(d));
  var rv=async function(s){return s&&s.startsWith('idb:')?await _imgGet(s):(s||'');};
  if(data.aboutPhoto)data.aboutPhoto=await rv(data.aboutPhoto);
  for(var k of['marketingEntries','projectEntries']){for(var e of(data[k]||[])){e.coverImg=await rv(e.coverImg||'');for(var m of(e.media||[]))m.src=await rv(m.src||'');}}
  return data;
}

const DEFAULT_MARKETING=[
  {num:'01',title:'Alumni Relations Office',role:'Marketing & Events Intern',
   body:'Led content creation for Instagram and Facebook, driving alumni engagement through compelling event recaps and storytelling. Conducted alumni outreach and interviews to highlight their journeys. Supported planning and execution of alumni events.',
   tags:['Instagram','Facebook','Content Creation','Event Planning'],coverImg:'',media:[],embeds:[]},
  {num:'02',title:'Boys & Girls Club of Whittier',role:'Community Outreach Program Lead',
   body:'Spearheaded social media strategies that boosted volunteer engagement by 25% through targeted campaigns. Produced 10 dynamic posts and 3 videos, driving a 15% increase in Instagram followers. Elevated brand visibility across five partner organizations.',
   tags:['+25% Engagement','+15% Followers','Video Production','LinkedIn'],coverImg:'',media:[],embeds:[]},
  {num:'03',title:'Community Outreach Program',role:'Social Media Manager',
   body:'Managed social platforms and created engaging content to promote volunteer initiatives. Organized over 10 events and campaigns. Designed quarterly newsletters using Canva.',
   tags:['Social Media','Canva','Newsletter Design','Event Campaigns'],coverImg:'',media:[],embeds:[]},
  {num:'04',title:'Astray Company',role:'Marketing Intern',
   body:'Led development of a corporate video at this startup focused on UN Sustainable Development Goals. Managed from concept to execution, aligning messaging with sustainability mission.',
   tags:['Video Production','Brand Messaging','Sustainability','Startup'],coverImg:'',media:[],embeds:[]},
];

const DEFAULT_PROJECTS=[
  {num:'01',title:'AM Design',role:'Founder & Creative Director',body:'A lifestyle brand I founded to celebrate global creativity and support emerging artists.',tags:[],coverImg:'',media:[],embeds:[]},
  {num:'02',title:'A Saving Company',role:'Project Manager',body:'A Taipei-based brand creating handcrafted silver jewelry and lifestyle items.',tags:[],coverImg:'',media:[],embeds:[]},
  {num:'03',title:'Whittier College — CEC',role:'Social Media & Outreach Coordinator',body:'Managed social media and organized campus-wide volunteerism initiatives.',tags:[],coverImg:'',media:[],embeds:[]},
  {num:'04',title:'Meaning Taiwan',role:'Project Coordinator',body:'A Taiwanese brand offering customizable wedding and event gifts.',tags:[],coverImg:'',media:[],embeds:[]},
  {num:'05',title:'Meaning Wedding',role:'Production & Vendor Manager',body:'Personalized wedding gift brand. Led full production and vendor management.',tags:[],coverImg:'',media:[],embeds:[]},
];

function buildEntries(entries, section){
  return entries.map((e,i)=>`
    <div class="entry">
      <div class="entry-content">
        <div class="entry-header">
          <span class="entry-num">${e.num}</span>
          <div>
            <a class="entry-title-link" href="entry.html?s=${section}&i=${i}">${e.title}</a>
            <div class="entry-role">${e.role}</div>
            <p class="entry-intro">${e.shortIntro||e.body}</p>
            <a class="view-case" href="entry.html?s=${section}&i=${i}">View full case →</a>
          </div>
        </div>
        ${(e.media&&e.media.length)?`
          <div class="gallery">
            ${e.media.map((m,j)=>`
              <div class="gallery-item${m.type==='video'?' video-item':''}" onclick="openLightbox('${section}',${i},${j})">
                ${m.type==='video'
                  ?`<video src="${m.src}" muted preload="metadata"></video>`
                  :`<img src="${m.src}" alt="" loading="lazy"/>`}
              </div>`).join('')}
          </div>`:''}
      </div>
    </div>
  `).join('');
}

function render(){
  const d=getData();
  const mEntries=d.marketingEntries||DEFAULT_MARKETING;
  const pEntries=d.projectEntries||DEFAULT_PROJECTS;
  document.getElementById('marketing-container').innerHTML=buildEntries(mEntries,'marketing');
  document.getElementById('projects-container').innerHTML=buildEntries(pEntries,'projects');
}

// Lightbox — tracks section, entry index, media index
const _lb={section:'',entry:-1,idx:-1};
function openLightbox(section,ei,j){
  _lb.section=section;_lb.entry=ei;_lb.idx=j;
  showLBItem();
  document.getElementById('lightbox').classList.add('open');
}
function showLBItem(){
  const d=getData();
  const key=_lb.section==='marketing'?'marketingEntries':'projectEntries';
  const def=_lb.section==='marketing'?DEFAULT_MARKETING:DEFAULT_PROJECTS;
  const entries=d[key]||def;
  const item=entries[_lb.entry].media[_lb.idx];
  const inner=document.getElementById('lightbox-inner');
  inner.querySelectorAll('img,video').forEach(el=>el.remove());
  const el=item.type==='video'?document.createElement('video'):document.createElement('img');
  el.src=item.src;
  if(item.type==='video'){el.controls=true;el.autoplay=true;}
  inner.insertBefore(el,inner.firstChild.nextSibling);
}
function lbNav(dir){
  const d=getData();
  const key=_lb.section==='marketing'?'marketingEntries':'projectEntries';
  const def=_lb.section==='marketing'?DEFAULT_MARKETING:DEFAULT_PROJECTS;
  const entries=d[key]||def;
  const len=entries[_lb.entry].media.length;
  _lb.idx=(_lb.idx+dir+len)%len;showLBItem();
}
function closeLightbox(e){
  if(e&&e.target!==document.getElementById('lightbox')) return;
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-inner').querySelectorAll('video').forEach(v=>v.pause());
}
document.addEventListener('keydown',e=>{
  const lb=document.getElementById('lightbox');
  if(!lb.classList.contains('open')) return;
  if(e.key==='Escape') closeLightbox({target:lb});
  if(e.key==='ArrowLeft') lbNav(-1);
  if(e.key==='ArrowRight') lbNav(1);
});

const DEFAULT_SOCIALS=[{label:'Email',url:'mailto:wandahuang87@gmail.com',icon:'✉'},{label:'LinkedIn',url:'http://www.linkedin.com/in/wandah87',icon:'in'}];
function renderSocials(){
  const d=getData();
  (d.socials||DEFAULT_SOCIALS).forEach(s=>{
    const a=document.createElement('a');a.className='social-link';a.href=s.url;a.target='_blank';
    a.innerHTML=`<span>${s.icon||'↗'}</span> ${s.label}`;
    document.getElementById('social-links').appendChild(a);
  });
}
(async function(){_D=await _resolveImgs(_rawData());render();renderSocials();})();
</script>
</body>
</html>
